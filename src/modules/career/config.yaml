data_dir: data/career
llm_provider: claude

trend_sources:
  github_languages: [python, go, typescript, java, rust]
  hn_min_score: 50
  devto_tags: [backend, python, go, devops, career, system-design]
  github_trending_url: "https://github.com/trending/{language}?since=daily"
  hn_top_stories_url: "https://hacker-news.firebaseio.com/v0/topstories.json"
  hn_item_url: "https://hacker-news.firebaseio.com/v0/item/{id}.json"
  devto_api_url: "https://dev.to/api/articles"
  devto_per_page: 30

job_sources:
  wanted:
    api_url: "https://www.wanted.co.kr/api/v4/jobs"
    job_group_id: 518   # 백엔드 개발자
    limit: 100
    tag_ids: []
  jumpit:
    api_url: "https://api.jumpit.co.kr/api/positions"
    job_category: 1     # 서버/백엔드
    limit: 100

concurrency:
  collector_semaphore: 3
  hn_story_semaphore: 5
  hn_stories_limit: 30  # top stories 중 상위 N개만 수집

report:
  skill_gap_history_weeks: 4
  weekly_daily_reports_count: 7

community_sources:
  reddit:
    subreddits:
      - cscareerquestions
      - ExperiencedDevs
      - MachineLearning
      - artificial
      - LocalLLaMA
      - devops
      - programming
    limit_per_subreddit: 10
    min_score: 50
    user_agent: "Consigliere Career Bot 1.0 (by /u/consigliere_bot)"
    timeout: 20
    # 인증 불필요: Reddit 공개 JSON API (/r/{sub}/top.json) 사용
  nitter:
    instances:
      - "https://nitter.net"
      - "https://nitter.privacydev.net"
      - "https://nitter.poast.org"
      - "https://nitter.1d4.us"
    keywords:
      - "AI LLM"
      - "programming devops"
      - "software engineer"
      - "AI jobs"
    timeout: 15
    max_tweets_per_keyword: 10
  clien:
    board_url: "https://www.clien.net/service/board/cm_programmers"
    limit: 20
  dcinside:
    gallery_id: "programming"
    list_url: "https://gall.dcinside.com/board/lists/?id=programming"
    limit: 20
